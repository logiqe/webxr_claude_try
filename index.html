<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean VR - Immersive Underwater Experience</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #001a2e; overflow: hidden; font-family: Arial, sans-serif; }
  canvas { display: block; }
  #vr-button {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    padding: 14px 32px; background: rgba(0,120,200,0.85); color: #fff;
    border: 2px solid rgba(100,200,255,0.7); border-radius: 30px;
    font-size: 16px; font-weight: bold; cursor: pointer;
    backdrop-filter: blur(6px); letter-spacing: 1px;
    transition: background 0.3s, transform 0.2s;
    z-index: 100;
  }
  #vr-button:hover { background: rgba(0,160,255,0.95); transform: translateX(-50%) scale(1.05); }
  #info {
    position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
    color: rgba(180,230,255,0.85); font-size: 13px; text-align: center;
    pointer-events: none; z-index: 100; text-shadow: 0 0 8px #0af;
  }
</style>
</head>
<body>
<div id="info">🌊 Ocean VR &nbsp;|&nbsp; Three.js WebXR &nbsp;|&nbsp; Utilisez la souris pour regarder autour</div>
<button id="vr-button">🥽 Enter VR</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─────────────────────────────────────────────
// SCENE SETUP
// ─────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x001830);
scene.fog = new THREE.FogExp2(0x001c3d, 0.018);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, -2, 0); // underwater

// ─────────────────────────────────────────────
// MOUSE LOOK (non-VR)
// ─────────────────────────────────────────────
let isPointerLocked = false;
let yaw = 0, pitch = 0;
renderer.domElement.addEventListener('click', () => {
  if (!renderer.xr.isPresenting) renderer.domElement.requestPointerLock();
});
document.addEventListener('pointerlockchange', () => {
  isPointerLocked = document.pointerLockElement === renderer.domElement;
});
document.addEventListener('mousemove', (e) => {
  if (!isPointerLocked) return;
  yaw   -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, pitch));
});

// ─────────────────────────────────────────────
// LIGHTS
// ─────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0x0a2a4a, 1.2);
scene.add(ambient);

const sunLight = new THREE.DirectionalLight(0x4488cc, 1.5);
sunLight.position.set(10, 30, 10);
sunLight.castShadow = true;
sunLight.shadow.camera.near = 0.1;
sunLight.shadow.camera.far = 200;
sunLight.shadow.mapSize.set(1024, 1024);
scene.add(sunLight);

const bluePt = new THREE.PointLight(0x0055ff, 3, 60);
bluePt.position.set(0, 5, 0);
scene.add(bluePt);

const causticPt = new THREE.PointLight(0x00aaff, 2, 40);
causticPt.position.set(-10, 2, -10);
scene.add(causticPt);

// ─────────────────────────────────────────────
// SKY DOME
// ─────────────────────────────────────────────
const skyGeo = new THREE.SphereGeometry(240, 32, 16);
const skyMat = new THREE.ShaderMaterial({
  side: THREE.BackSide,
  uniforms: { time: { value: 0 } },
  vertexShader: `
    varying vec3 vPos;
    void main() { vPos = position; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }
  `,
  fragmentShader: `
    varying vec3 vPos;
    uniform float time;
    void main() {
      float t = (vPos.y + 240.0) / 480.0;
      vec3 horizon = vec3(0.05, 0.25, 0.55);
      vec3 zenith  = vec3(0.01, 0.08, 0.22);
      vec3 col = mix(horizon, zenith, clamp(t*1.4, 0.0, 1.0));
      // sun
      vec3 sunDir = normalize(vec3(0.4, 0.7, -0.3));
      vec3 vn = normalize(vPos);
      float sun = pow(max(dot(vn, sunDir), 0.0), 80.0);
      col += vec3(1.0, 0.9, 0.6) * sun * 0.8;
      gl_FragColor = vec4(col, 1.0);
    }
  `
});
scene.add(new THREE.Mesh(skyGeo, skyMat));

// ─────────────────────────────────────────────
// OCEAN SURFACE (animated shader)
// ─────────────────────────────────────────────
const oceanGeo = new THREE.PlaneGeometry(300, 300, 120, 120);
const oceanMat = new THREE.ShaderMaterial({
  side: THREE.DoubleSide,
  transparent: true,
  uniforms: {
    time: { value: 0 },
    color1: { value: new THREE.Color(0x003366) },
    color2: { value: new THREE.Color(0x0077aa) },
  },
  vertexShader: `
    uniform float time;
    varying vec2 vUv;
    varying float vWave;
    varying vec3 vNormal2;
    
    float wave(vec2 pos, float freq, float speed, float amp, vec2 dir) {
      return sin(dot(pos, dir) * freq + time * speed) * amp;
    }
    void main() {
      vUv = uv;
      vec3 pos = position;
      float w = 0.0;
      w += wave(pos.xz, 0.08, 1.2, 1.8, normalize(vec2(1.0, 0.6)));
      w += wave(pos.xz, 0.12, 0.9, 1.2, normalize(vec2(-0.7, 1.0)));
      w += wave(pos.xz, 0.20, 1.8, 0.6, normalize(vec2(0.5, -0.8)));
      w += wave(pos.xz, 0.35, 2.5, 0.3, normalize(vec2(-0.3, -0.5)));
      w += wave(pos.xz, 0.05, 0.5, 2.5, normalize(vec2(0.8, 0.2)));
      pos.y += w;
      vWave = w;
      
      // approximate normal
      float eps = 0.5;
      float wx = wave(pos.xz + vec2(eps,0.0),0.08,1.2,1.8,normalize(vec2(1.0,0.6)))
               + wave(pos.xz + vec2(eps,0.0),0.12,0.9,1.2,normalize(vec2(-0.7,1.0)))
               + wave(pos.xz + vec2(eps,0.0),0.20,1.8,0.6,normalize(vec2(0.5,-0.8)));
      float wz = wave(pos.xz + vec2(0.0,eps),0.08,1.2,1.8,normalize(vec2(1.0,0.6)))
               + wave(pos.xz + vec2(0.0,eps),0.12,0.9,1.2,normalize(vec2(-0.7,1.0)))
               + wave(pos.xz + vec2(0.0,eps),0.20,1.8,0.6,normalize(vec2(0.5,-0.8)));
      vNormal2 = normalize(vec3(w - wx, eps, w - wz));
      
      gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
    }
  `,
  fragmentShader: `
    uniform vec3 color1;
    uniform vec3 color2;
    varying vec2 vUv;
    varying float vWave;
    varying vec3 vNormal2;
    void main() {
      float t = clamp((vWave + 3.0) / 6.0, 0.0, 1.0);
      vec3 col = mix(color1, color2, t);
      float spec = pow(max(dot(normalize(vNormal2), normalize(vec3(0.4,0.7,-0.3))), 0.0), 40.0);
      col += vec3(0.6, 0.85, 1.0) * spec * 0.5;
      float foam = smoothstep(0.6, 1.0, (vWave + 3.0) / 6.0);
      col = mix(col, vec3(0.7, 0.9, 1.0), foam * 0.3);
      gl_FragColor = vec4(col, 0.82);
    }
  `
});
const ocean = new THREE.Mesh(oceanGeo, oceanMat);
ocean.rotation.x = -Math.PI / 2;
ocean.position.y = 2;
ocean.receiveShadow = true;
scene.add(ocean);

// ─────────────────────────────────────────────
// OCEAN FLOOR
// ─────────────────────────────────────────────
const floorGeo = new THREE.PlaneGeometry(300, 300, 60, 60);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x112244, roughness: 0.9, metalness: 0.1
});
// add some variation
const floorPos = floorGeo.attributes.position;
for (let i = 0; i < floorPos.count; i++) {
  const x = floorPos.getX(i), z = floorPos.getZ(i);
  floorPos.setY(i, Math.sin(x*0.1)*0.5 + Math.cos(z*0.15)*0.4 + (Math.random()-0.5)*0.3);
}
floorGeo.computeVertexNormals();
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -25;
floor.receiveShadow = true;
scene.add(floor);

// ─────────────────────────────────────────────
// UNDERWATER VOLUME (inner sphere)
// ─────────────────────────────────────────────
const uwGeo = new THREE.SphereGeometry(180, 24, 16);
const uwMat = new THREE.ShaderMaterial({
  side: THREE.BackSide,
  transparent: true,
  depthWrite: false,
  uniforms: { time: { value: 0 } },
  vertexShader: `
    varying vec3 vPos;
    void main() { vPos = position; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }
  `,
  fragmentShader: `
    varying vec3 vPos;
    uniform float time;
    void main() {
      float t = clamp((-vPos.y + 30.0) / 120.0, 0.0, 1.0);
      vec3 deep  = vec3(0.0, 0.02, 0.08);
      vec3 mid   = vec3(0.0, 0.12, 0.35);
      vec3 col   = mix(mid, deep, t);
      float alpha = 0.35 + t * 0.3;
      gl_FragColor = vec4(col, alpha);
    }
  `
});
scene.add(new THREE.Mesh(uwGeo, uwMat));

// ─────────────────────────────────────────────
// GOD RAYS
// ─────────────────────────────────────────────
const godRaysMat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  uniforms: { time: { value: 0 } },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }
  `,
  fragmentShader: `
    varying vec2 vUv;
    uniform float time;
    void main() {
      float ray = smoothstep(0.48, 0.5, vUv.x) * smoothstep(0.52, 0.5, vUv.x);
      float fade = vUv.y * (1.0 - vUv.y) * 4.0;
      float flicker = 0.7 + 0.3 * sin(time * 1.5 + vUv.y * 8.0);
      float alpha = ray * fade * flicker * 0.35;
      gl_FragColor = vec4(0.3, 0.7, 1.0, alpha);
    }
  `
});

const godRayGroup = new THREE.Group();
for (let i = 0; i < 14; i++) {
  const angle = (i / 14) * Math.PI * 2 + Math.random() * 0.5;
  const dist  = 4 + Math.random() * 12;
  const w     = 1.5 + Math.random() * 3;
  const h     = 18 + Math.random() * 20;
  const geo   = new THREE.PlaneGeometry(w, h);
  const mesh  = new THREE.Mesh(geo, godRaysMat.clone());
  mesh.position.set(Math.cos(angle) * dist, ocean.position.y - h/2, Math.sin(angle) * dist);
  mesh.rotation.y = angle;
  mesh.rotation.x = -0.08;
  mesh.userData.phaseOffset = Math.random() * Math.PI * 2;
  godRayGroup.add(mesh);
}
scene.add(godRayGroup);

// ─────────────────────────────────────────────
// BUBBLES
// ─────────────────────────────────────────────
const BUBBLE_COUNT = 300;
const bubbleGeo = new THREE.BufferGeometry();
const bubblePos = new Float32Array(BUBBLE_COUNT * 3);
const bubbleData = [];
for (let i = 0; i < BUBBLE_COUNT; i++) {
  const x = (Math.random() - 0.5) * 80;
  const y = -25 + Math.random() * 30;
  const z = (Math.random() - 0.5) * 80;
  bubblePos[i*3]   = x;
  bubblePos[i*3+1] = y;
  bubblePos[i*3+2] = z;
  bubbleData.push({ baseX: x, baseZ: z, speed: 0.5 + Math.random() * 1.5,
                    sway: (Math.random()-0.5)*0.5, phase: Math.random()*Math.PI*2 });
}
bubbleGeo.setAttribute('position', new THREE.BufferAttribute(bubblePos, 3));
const bubbleMat = new THREE.PointsMaterial({
  color: 0xaaddff, size: 0.18, transparent: true, opacity: 0.6,
  sizeAttenuation: true, blending: THREE.AdditiveBlending, depthWrite: false
});
const bubbles = new THREE.Points(bubbleGeo, bubbleMat);
scene.add(bubbles);

// ─────────────────────────────────────────────
// CORAL / ROCKS
// ─────────────────────────────────────────────
function addCoral(x, z, color, h) {
  const geo = new THREE.ConeGeometry(0.2 + Math.random()*0.3, h, 5 + Math.floor(Math.random()*3));
  const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.8, emissive: color, emissiveIntensity: 0.15 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, -25 + h/2 - 0.5, z);
  mesh.rotation.y = Math.random() * Math.PI;
  scene.add(mesh);
}
const coralColors = [0xff4466, 0xff8800, 0xffdd00, 0x88ff44, 0xff66aa, 0x44ffcc];
for (let i = 0; i < 80; i++) {
  const angle = Math.random() * Math.PI * 2;
  const r = 5 + Math.random() * 35;
  addCoral(Math.cos(angle)*r, Math.sin(angle)*r, coralColors[Math.floor(Math.random()*coralColors.length)], 1+Math.random()*4);
}

// ─────────────────────────────────────────────
// FISH SPECIES DEFINITIONS
// ─────────────────────────────────────────────
function createFishGeometry(type) {
  const group = new THREE.Group();
  if (type === 0) {
    // Streamlined tropical fish
    const body = new THREE.Mesh(
      new THREE.SphereGeometry(1, 8, 6),
      new THREE.MeshStandardMaterial({ color: 0xffaa00, roughness: 0.4 })
    );
    body.scale.set(1.4, 0.7, 0.55);
    group.add(body);
    const stripe = new THREE.Mesh(
      new THREE.TorusGeometry(0.55, 0.12, 6, 12),
      new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4 })
    );
    stripe.rotation.y = Math.PI/2;
    stripe.scale.z = 0.3;
    group.add(stripe);
    const tail = new THREE.Mesh(
      new THREE.ConeGeometry(0.45, 0.9, 4),
      new THREE.MeshStandardMaterial({ color: 0xff6600, roughness: 0.5 })
    );
    tail.rotation.z = Math.PI/2; tail.position.x = -1.1;
    group.add(tail);
    const fin = new THREE.Mesh(
      new THREE.ConeGeometry(0.25, 0.6, 4),
      new THREE.MeshStandardMaterial({ color: 0xff8800, roughness: 0.5 })
    );
    fin.position.set(0.1, 0.7, 0); group.add(fin);
  } else if (type === 1) {
    // Blue elongated fish
    const body = new THREE.Mesh(
      new THREE.CylinderGeometry(0.18, 0.08, 2.0, 8),
      new THREE.MeshStandardMaterial({ color: 0x2255cc, roughness: 0.3, metalness: 0.3 })
    );
    body.rotation.z = Math.PI/2; group.add(body);
    const head = new THREE.Mesh(
      new THREE.SphereGeometry(0.22, 7, 5),
      new THREE.MeshStandardMaterial({ color: 0x1144aa, roughness: 0.3 })
    );
    head.position.x = 1.0; group.add(head);
    const tail = new THREE.Mesh(
      new THREE.ConeGeometry(0.22, 0.5, 4),
      new THREE.MeshStandardMaterial({ color: 0x3366ff, roughness: 0.4 })
    );
    tail.rotation.z = Math.PI/2; tail.position.x = -1.15; group.add(tail);
    const dorsal = new THREE.Mesh(
      new THREE.ConeGeometry(0.12, 0.35, 3),
      new THREE.MeshStandardMaterial({ color: 0x4488ff, roughness: 0.5 })
    );
    dorsal.position.set(0, 0.3, 0); group.add(dorsal);
  } else {
    // Green flat disc fish
    const body = new THREE.Mesh(
      new THREE.SphereGeometry(0.9, 8, 6),
      new THREE.MeshStandardMaterial({ color: 0x22bb66, roughness: 0.4, metalness: 0.2 })
    );
    body.scale.set(1.0, 0.5, 0.7);
    group.add(body);
    // stripes
    for (let s = -1; s <= 1; s++) {
      const stripe = new THREE.Mesh(
        new THREE.BoxGeometry(0.08, 1.1, 1.5),
        new THREE.MeshStandardMaterial({ color: 0x118844, roughness: 0.5 })
      );
      stripe.position.x = s * 0.3; group.add(stripe);
    }
    const tail = new THREE.Mesh(
      new THREE.ConeGeometry(0.38, 0.7, 4),
      new THREE.MeshStandardMaterial({ color: 0x11aa55, roughness: 0.5 })
    );
    tail.rotation.z = Math.PI/2; tail.position.x = -1.05; group.add(tail);
  }
  return group;
}

// ─────────────────────────────────────────────
// SCHOOLS OF FISH (Boids)
// ─────────────────────────────────────────────
class School {
  constructor(type, count, center, scale, speed, color) {
    this.type   = type;
    this.count  = count;
    this.center = center.clone();
    this.scale  = scale;
    this.speed  = speed;
    this.color  = color;
    this.fishes = [];
    this.positions  = [];
    this.velocities = [];
    this.phases     = [];
    this.targets    = [];
    this.centerTarget = center.clone();
    this.targetTimer  = 0;

    for (let i = 0; i < count; i++) {
      const mesh = createFishGeometry(type);
      const s = scale * (0.8 + Math.random()*0.4);
      mesh.scale.setScalar(s);
      // colorize
      mesh.traverse(c => { if (c.isMesh && c.material) {
        const h = new THREE.Color(c.material.color);
        h.offsetHSL((Math.random()-0.5)*0.05, 0, (Math.random()-0.5)*0.1);
        c.material = c.material.clone(); c.material.color.copy(h);
      }});
      const pos = new THREE.Vector3(
        center.x + (Math.random()-0.5)*8,
        center.y + (Math.random()-0.5)*4,
        center.z + (Math.random()-0.5)*8
      );
      mesh.position.copy(pos);
      scene.add(mesh);
      this.fishes.push(mesh);
      this.positions.push(pos);
      this.velocities.push(new THREE.Vector3(
        (Math.random()-0.5)*0.05, (Math.random()-0.5)*0.02, (Math.random()-0.5)*0.05
      ));
      this.phases.push(Math.random()*Math.PI*2);
    }
  }

  update(dt, t) {
    this.targetTimer -= dt;
    if (this.targetTimer <= 0) {
      const r = 25 + Math.random()*20;
      const a = Math.random()*Math.PI*2;
      this.centerTarget.set(Math.cos(a)*r, this.center.y + (Math.random()-0.5)*6, Math.sin(a)*r);
      this.targetTimer = 8 + Math.random()*12;
    }
    this.center.lerp(this.centerTarget, dt * 0.15);

    const SEPARATION_DIST = 2.5 * this.scale;
    const COHESION_DIST   = 12.0 * this.scale;
    const MAX_SPEED       = this.speed;
    const n = this.count;

    for (let i = 0; i < n; i++) {
      const pos = this.positions[i];
      const vel = this.velocities[i];

      const sep = new THREE.Vector3();
      const coh = new THREE.Vector3();
      const ali = new THREE.Vector3();
      let sepCount = 0, cohCount = 0;

      for (let j = 0; j < n; j++) {
        if (i === j) continue;
        const diff = new THREE.Vector3().subVectors(pos, this.positions[j]);
        const dist = diff.length();
        if (dist < SEPARATION_DIST && dist > 0.001) {
          sep.addScaledVector(diff.normalize(), 1.0/dist);
          sepCount++;
        }
        if (dist < COHESION_DIST) {
          coh.add(this.positions[j]);
          ali.add(this.velocities[j]);
          cohCount++;
        }
      }
      if (sepCount > 0) { sep.divideScalar(sepCount); }
      if (cohCount > 0) {
        coh.divideScalar(cohCount);
        coh.subVectors(coh, pos).multiplyScalar(0.003);
        ali.divideScalar(cohCount).multiplyScalar(0.04);
      }

      // Attraction to school center
      const toCentre = new THREE.Vector3().subVectors(this.center, pos).multiplyScalar(0.008);

      // Boundary soft walls
      const bounds = new THREE.Vector3();
      const bR = 55;
      if (pos.length() > bR) bounds.addScaledVector(pos.clone().negate().normalize(), 0.02);
      if (pos.y > 1)   bounds.y -= 0.015;
      if (pos.y < -23) bounds.y += 0.015;

      vel.addScaledVector(sep, 0.06);
      vel.add(coh).add(ali).add(toCentre).add(bounds);

      // Clamp speed
      const spd = vel.length();
      if (spd > MAX_SPEED) vel.multiplyScalar(MAX_SPEED / spd);
      if (spd < MAX_SPEED * 0.2) vel.multiplyScalar(1.05);

      pos.addScaledVector(vel, dt * 60);
      this.positions[i].copy(pos);
    }

    // Update meshes
    for (let i = 0; i < n; i++) {
      const mesh = this.fishes[i];
      const vel  = this.velocities[i];
      mesh.position.copy(this.positions[i]);

      // Face direction of travel
      if (vel.length() > 0.001) {
        const target = mesh.position.clone().add(vel);
        mesh.lookAt(target);
      }

      // Swim animation (body waggle)
      const sw = Math.sin(t * 4 + this.phases[i]) * 0.25;
      mesh.rotation.z += sw * dt * 2;
      // Tail wag via children scale
      mesh.children.forEach((c, ci) => {
        if (ci === mesh.children.length - 1) {
          c.rotation.y = Math.sin(t * 4 + this.phases[i]) * 0.4;
        }
      });
    }
  }
}

// Create 3 schools
const schools = [
  new School(0, 22, new THREE.Vector3(15, -5, 10),  0.4, 0.12, 0xffaa00),
  new School(1, 30, new THREE.Vector3(-20, -8, -15), 0.28, 0.14, 0x2255cc),
  new School(2, 18, new THREE.Vector3(5,  -12, -20), 0.5,  0.10, 0x22bb66),
];

// ─────────────────────────────────────────────
// CAUSTIC PARTICLES (extra ambient)
// ─────────────────────────────────────────────
const causticCount = 200;
const causticGeo   = new THREE.BufferGeometry();
const causticBuf   = new Float32Array(causticCount * 3);
const causticDat   = [];
for (let i = 0; i < causticCount; i++) {
  const x = (Math.random()-0.5)*60, z = (Math.random()-0.5)*60;
  causticBuf[i*3]=x; causticBuf[i*3+1]=-2 + Math.random()*(-22); causticBuf[i*3+2]=z;
  causticDat.push({ phase: Math.random()*Math.PI*2, speed: 0.3+Math.random()*0.7 });
}
causticGeo.setAttribute('position', new THREE.BufferAttribute(causticBuf, 3));
const causticMat = new THREE.PointsMaterial({
  color: 0x88ddff, size: 0.4, transparent: true, opacity: 0.25,
  sizeAttenuation: true, blending: THREE.AdditiveBlending, depthWrite: false
});
scene.add(new THREE.Points(causticGeo, causticMat));

// ─────────────────────────────────────────────
// SEAWEED
// ─────────────────────────────────────────────
function addSeaweed(x, z) {
  const segs = 6;
  const color = new THREE.Color().setHSL(0.35 + Math.random()*0.1, 0.7, 0.35);
  const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.9, side: THREE.DoubleSide });
  for (let s = 0; s < segs; s++) {
    const geo = new THREE.PlaneGeometry(0.2, 0.5);
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x + (Math.random()-0.5)*0.3, -25 + 0.25 + s*0.4, z);
    mesh.rotation.y = Math.random()*Math.PI;
    mesh.userData.swayPhase = Math.random()*Math.PI*2;
    mesh.userData.swayAmp   = 0.15 + Math.random()*0.1;
    scene.add(mesh);
  }
}
for (let i = 0; i < 60; i++) {
  const a = Math.random()*Math.PI*2, r = 3+Math.random()*28;
  addSeaweed(Math.cos(a)*r, Math.sin(a)*r);
}

// ─────────────────────────────────────────────
// VR BUTTON
// ─────────────────────────────────────────────
const vrBtn = document.getElementById('vr-button');
vrBtn.addEventListener('click', async () => {
  if (!navigator.xr) { alert('WebXR not supported in this browser.'); return; }
  const supported = await navigator.xr.isSessionSupported('immersive-vr');
  if (!supported) { alert('Immersive VR not supported on this device/browser.'); return; }
  if (renderer.xr.isPresenting) return;
  const session = await navigator.xr.requestSession('immersive-vr', {
    requiredFeatures: ['viewer'],
    optionalFeatures: ['local-floor', 'bounded-floor']
  });
  renderer.xr.setSession(session);
  vrBtn.textContent = '⏹ Exit VR';
  session.addEventListener('end', () => { vrBtn.textContent = '🥽 Enter VR'; });
});

// ─────────────────────────────────────────────
// RESIZE
// ─────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─────────────────────────────────────────────
// CLOCK & ANIMATION LOOP
// ─────────────────────────────────────────────
const clock = new THREE.Clock();
let lastT = 0;

renderer.setAnimationLoop(() => {
  const t  = clock.getElapsedTime();
  const dt = Math.min(t - lastT, 0.05);
  lastT = t;

  // Sky
  skyMat.uniforms.time.value = t;

  // Ocean
  oceanMat.uniforms.time.value = t;
  uwMat.uniforms.time.value    = t;

  // God rays flicker
  godRayGroup.children.forEach((r, i) => {
    r.material.uniforms.time.value = t + r.userData.phaseOffset;
    r.position.y = ocean.position.y - r.geometry.parameters.height/2 + Math.sin(t*0.3+i)*0.3;
  });

  // Blue point light pulse
  bluePt.intensity   = 2.5 + Math.sin(t*0.8)*0.5;
  causticPt.position.x = Math.sin(t*0.4)*15;
  causticPt.position.z = Math.cos(t*0.3)*15;

  // Bubbles
  const bPos = bubbles.geometry.attributes.position.array;
  for (let i = 0; i < BUBBLE_COUNT; i++) {
    bPos[i*3+1] += bubbleData[i].speed * dt;
    bPos[i*3]    = bubbleData[i].baseX + Math.sin(t*0.8 + bubbleData[i].phase) * 0.3;
    if (bPos[i*3+1] > 2.5) {
      bPos[i*3+1] = -25;
      bubbleData[i].baseX = (Math.random()-0.5)*80;
      bubbleData[i].baseZ = (Math.random()-0.5)*80;
      bPos[i*3+2] = bubbleData[i].baseZ;
    }
  }
  bubbles.geometry.attributes.position.needsUpdate = true;

  // Caustics shimmer
  const cPos = causticGeo.attributes.position.array;
  for (let i = 0; i < causticCount; i++) {
    cPos[i*3]   += Math.sin(t*causticDat[i].speed + causticDat[i].phase)*0.005;
    cPos[i*3+2] += Math.cos(t*causticDat[i].speed + causticDat[i].phase)*0.005;
  }
  causticGeo.attributes.position.needsUpdate = true;

  // Fish schools
  schools.forEach(s => s.update(dt, t));

  // Seaweed sway
  scene.children.forEach(child => {
    if (child.userData.swayPhase !== undefined) {
      child.rotation.z = Math.sin(t*1.2 + child.userData.swayPhase) * child.userData.swayAmp;
    }
  });

  // Camera (non-VR)
  if (!renderer.xr.isPresenting) {
    camera.rotation.order = 'YXZ';
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;
    // gentle drift
    camera.position.y = -2 + Math.sin(t*0.25)*0.3;
  }

  renderer.render(scene, camera);
});
</script>
